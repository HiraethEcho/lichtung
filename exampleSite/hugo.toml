# =============================================================================
# Lichtung Theme — Example Site Configuration
# =============================================================================
# Run: cd exampleSite && hugo server --themesDir ../..
# =============================================================================

# ---- Site Basics -----------------------------------------------------------

baseURL = 'https://hiraethecho.github.io/lichtung'
title = 'Lichtung'
theme = 'lichtung'
hasCJKLanguage = true            # 启用中日韩文字支持（影响字数统计等）
enableGitInfo = true             # demo 站点不需要 Git 信息
mainSections = ['docs']
themesDir = '../..'

[frontmatter]
date = ['published', 'publishdate', 'pubdate', 'date', 'lastmod', 'modified']

# ---- Custom Output Formats -------------------------------------------------
[outputs]
home = ["HTML", "RSS", "JSON", "CROSSLINKS"]

[outputFormats.crosslinks]
mediaType = 'application/json'
baseName = 'crosslinks'
isPlainText = true
notAlternative = true
weight = 1

# ---- Taxonomies (分类系统) --------------------------------------------------
[taxonomies]
tag = 'tags'            # 标签
category = 'categories' # 分类
series = 'series'       # 系列

# ---- Params (主题参数) ------------------------------------------------------
[params]

# --- 站点信息 ---
subtitle = '林中空地'
description = 'Lichtung Hugo 主题示例站点，展示功能'
author = { name = 'Demo', email = 'demo@example.com' }
StartDate = '2024/01/01'

# --- 通用选项 ---
DateFormat = '2006/01/02'
ShowContentinRSS = false
comment = true
math = false
LastChangeLink = "https://github.com/hiraethecho/lichtung/commit"

# --- 评论系统 ---
cwd = false
waline = false
twikoo = false
giscus = true
gcsdata = { repo = "hiraethecho/hiraethecho.github.io", repoid = "R_kgDOJuZ2Uw", category = "General", categoryid = "DIC_kwDOJuZ2U84CyB5i", mapping = "title", position = "top", lang = "zh-CN" }
# --- 侧边栏组件 ---
ShowSiteSearch = true
SearchContent = true
SearchPlaceHolder = '搜索 ↵'
ShowTaxonomyTree = true
ShowFileTree = true
ShowSiteNav = true
ShowSiteInfo = true
ShowSiteCountWords = true
ShowSiteCountTerms = true
ShowSiteLink = true

# --- 页面列表选项 ---
ShowHeatMap = true
ShowSectionCountWords = true
ShowSubSection = true
ShowList = true
ListStyle = 'list'
ItemStyle = 'card'
ListLimit = ''

# --- 文章页面选项 ---
ShowToc = true
ShowRelPost = true
HugoRelPost = true
HugoRelPostLimit = 10
ShowForwardLink = true
ShowBackLink = true

# --- 首页选项 ---
ShowAllPagesInHome = false

# --- 归档页选项 ---
ShowAllPagesInArchive = true

# --- 分类页选项 ---
PostPerTermLimit = 10

# --- 搜索选项 ---
fuseOpts = { limit = 5, threshold = 0.1 }

# --- 外部链接 ---
[[params.links]]
name = 'GitHub'
url = 'https://github.com/hiraethecho/lichtung'
description = '源码'

[[params.links]]
name = 'Hugo'
url = 'https://gohugo.io'
description = 'SSG'

[[params.links]]
name = 'memex'
url = 'https://memex.keinmal.top'
description = '主站'

# --- 社交链接 ---
[[params.social]]
name = 'github'
url = 'https://github.com/hiraethecho/lichtung'
icon = 'github'

[[params.social]]
name = 'rss'
url = '/index.xml'
icon = 'rss'

# ---- 菜单（Menus） ---------------------------------------------------------
[menus]

[[menus.main]]
name = '首页'
url = '/'
weight = 1

[[menus.main]]
name = '文章'
url = '/posts'
weight = 10

[[menus.main]]
name = '文档'
url = '/docs'
weight = 20

[[menus.main]]
name = '更多'
identifier = 'more'

[[menus.main]]
name = '关于'
url = '/about'
weight = 30
parent = 'more'

[[menus.main]]
name = '归档'
url = '/archive'
weight = 40
parent = 'more'

[[menus.main]]
name = '索引'
url = '/indexes'
weight = 50
parent = 'more'

[[menus.side]]
name = 'nest side menu'
identifier = 'nest'

[[menus.side]]
name = '主题指南'
url = '/categories/guide'
parent = 'nest'

[[menus.side]]
name = '示例'
url = '/categories/example'
parent = 'nest'

# ---- 目录（Table of Contents）选项 ---
[markup.tableOfContents]
endLevel = 5
ordered = false
startLevel = 2

# ---- Goldmark（Markdown 渲染）选项 ---
[markup.goldmark]
duplicateResourceFiles = false

[markup.goldmark.extensions]
definitionList = true
linkify = true
linkifyProtocol = 'https'
strikethrough = false
table = true
taskList = true

[markup.goldmark.extensions.cjk]
enable = false

[markup.goldmark.extensions.extras]
[markup.goldmark.extensions.extras.delete]
enable = true
[markup.goldmark.extensions.extras.insert]
enable = true
[markup.goldmark.extensions.extras.mark]
enable = true
[markup.goldmark.extensions.extras.subscript]
enable = true
[markup.goldmark.extensions.extras.superscript]
enable = true

[markup.goldmark.extensions.passthrough]
enable = true
[markup.goldmark.extensions.passthrough.delimiters]
block = [['\[', '\]'], ['$$', '$$']]
inline = [['\(', '\)']]

[markup.goldmark.parser]
[markup.goldmark.parser.attribute]
block = true
title = true

[markup.goldmark.renderHooks]
[markup.goldmark.renderHooks.image]
useEmbedded = 'auto'
[markup.goldmark.renderHooks.link]
useEmbedded = 'auto'

[markup.goldmark.renderer]
hardWraps = false
unsafe = true
xhtml = false
