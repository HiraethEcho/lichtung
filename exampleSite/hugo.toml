# =============================================================================
# Lichtung Theme — Example Site Configuration
# =============================================================================
# Copy this file to your Hugo site root to use the Lichtung theme.
# Run: hugo server --themesDir ../..
# =============================================================================

baseURL = 'http://localhost:1313/'
title = 'Lichtung 示例站点'
theme = 'lichtung'
hasCJKLanguage = true
enableGitInfo = true
mainSections = ['posts', 'glade', 'diary', 'forest']

[frontmatter]
date = ['published', 'publishdate', 'pubdate', 'date', 'lastmod', 'modified']
publishDate = ['publishdate', 'pubdate', 'published', 'date']

[outputs]
home = ['HTML', 'RSS', 'JSON', 'CROSSLINKS']

[outputFormats.crosslinks]
mediaType = 'application/json'
baseName = 'crosslinks'
isPlainText = true
notAlternative = true
weight = 1

[taxonomies]
tag = 'tags'
category = 'categories'
series = 'series'
topic = 'topics'
genre = 'genres'

[params]

  # --- 站点信息 ---
  subtitle = 'Lichtung 主题示例站点'
  description = '展示 Lichtung Hugo 主题的所有功能与配置选项'
  author = { name = 'Lichtung', email = 'hi@example.com' }
  StartDate = '2024/01/01'

  # --- 通用选项 ---
  DateFormat = '2006/01/02'
  ShowContentinRSS = false
  comment = true
  math = false

  # --- 评论系统 ---
  cwd = false
  waline = true
  walineserver = 'https://hexowaline.netlify.app/.netlify/functions/comment'
  twikoo = false
  giscus = false

  LastChangeLink = 'https://github.com/user/repo/commit'

  # --- 侧边栏组件 ---
  ShowSiteSearch = true
  SearchContent = true
  SearchPlaceHolder = 'Search ↵'
  ShowTaxonomyTree = true
  ShowFileTree = true
  ShowSiteNav = true
  ShowSiteInfo = true
  ShowSiteCountWords = true
  ShowSiteCountTerms = true
  ShowSiteLink = false

  # --- 页面列表选项 ---
  ShowHeatMap = true
  ShowSectionCountWords = false
  ShowSubSection = true
  ShowList = true
  ListType = 'plain'
  ShowCountWordsPerYear = false
  ShowCountWordsPerMonth = false
  ShowPostsPerYear = false
  ShowPostsPerMonth = false
  ListLimit = ''

  # --- 文章页面选项 ---
  ShowToc = true
  ShowRelPost = true
  HugoRelPost = true
  HugoRelPostLimit = 10
  ShowForwardLink = true
  ShowBackLink = true

  # --- 首页选项 ---
  ShowAllPagesInHome = false

  # --- 归档页选项 ---
  ShowAllPagesInArchive = true

  # --- 分类页选项 ---
  PostPerTermLimit = 5

  # --- 搜索选项 ---
  fuseOpts = { limit = 5, threshold = 0.1 }

  # --- 外部链接 ---
  [[params.links]]
  name = 'GitHub'
  url = 'https://github.com'
  description = '代码托管'

  [[params.links]]
  name = 'Lichtung'
  url = 'https://github.com/hiraethecho/lichtung'
  description = '主题仓库'

  # --- 社交链接 ---
  [[params.social]]
  name = 'github'
  url = 'https://github.com/hiraethecho/lichtung'
  icon = 'github'

  [[params.social]]
  name = 'rss'
  url = '/index.xml'
  icon = 'rss'

# ---- 菜单 ----
[menus]

  [[menus.main]]
  name = '首页'
  url = '/'
  weight = 1

  [[menus.main]]
  name = '文章'
  url = '/posts'
  weight = 10

  [[menus.main]]
  name = '林中空地'
  url = '/glade'
  weight = 20

  [[menus.main]]
  name = '日常'
  url = '/diary'
  weight = 30

  [[menus.main]]
  name = '森林'
  url = '/forest'
  weight = 40

  [[menus.main]]
  name = '归档'
  url = '/archive'
  weight = 50

  [[menus.main]]
  name = '关于'
  url = '/about'
  weight = 60

  [[menus.main]]
  name = '索引'
  url = '/indexes'
  weight = 70

# ---- Markdown 渲染选项 ----
[markup]
[markup.tableOfContents]
endLevel = 5
ordered = false
startLevel = 2

[markup.goldmark]
duplicateResourceFiles = false

[markup.goldmark.extensions]
definitionList = true
linkify = true
linkifyProtocol = 'https'
strikethrough = false
table = true
taskList = true

[markup.goldmark.extensions.cjk]
enable = false

[markup.goldmark.extensions.extras]
[markup.goldmark.extensions.extras.delete]
enable = true
[markup.goldmark.extensions.extras.insert]
enable = true
[markup.goldmark.extensions.extras.mark]
enable = true
[markup.goldmark.extensions.extras.subscript]
enable = true
[markup.goldmark.extensions.extras.superscript]
enable = true

[markup.goldmark.extensions.passthrough]
enable = true
[markup.goldmark.extensions.passthrough.delimiters]
block = [['\[', '\]'], ['$$', '$$']]
inline = [['\(', '\)']]

[markup.goldmark.parser]
[markup.goldmark.parser.attribute]
block = true
title = true

[markup.goldmark.renderHooks]
[markup.goldmark.renderHooks.image]
useEmbedded = 'auto'
[markup.goldmark.renderHooks.link]
useEmbedded = 'auto'

[markup.goldmark.renderer]
hardWraps = false
unsafe = true
xhtml = false
